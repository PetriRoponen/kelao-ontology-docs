name: Generate Ontology Documentation

on:
  push:
    branches: [main]
    paths:
      - "kelao-ontology-core2.ttl"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  generate-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Download WIDOCO 1.4.25
        run: |
          wget -q \
            https://github.com/dgarijo/Widoco/releases/download/v1.4.25/widoco-1.4.25-jar-with-dependencies_JDK-17.jar \
            -O /tmp/widoco.jar
          echo "WIDOCO ladattu: $(du -sh /tmp/widoco.jar)"

      - name: Generate ontology documentation
        run: |
          set -e

          echo "=== WIDOCO tuetut parametrit ==="
          java -jar /tmp/widoco.jar --help 2>&1 || true

          echo "=== Generoidaan dokumentaatio ==="
          java -jar /tmp/widoco.jar \
            -ontFile kelao-ontology-core2.ttl \
            -outFolder /tmp/widoco-output \
            -lang en-fi \
            -rewriteAll \
            -includeAnnotationProperties \
            -webVowl \
            -htaccess

          echo "=== Tulostetiedostot ==="
          ls -la /tmp/widoco-output/

          echo "=== Kopioidaan repoon ==="
          rm -rf resources/ sections/ webvowl/
          rm -f index.html index-en.html index-fi.html 406.html
          rm -f ontology.jsonld ontology.nt ontology.owl ontology.ttl
          cp -r /tmp/widoco-output/. .
          ls -la

      - name: Commit and push updated documentation
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git status
          if git diff --staged --quiet; then
            echo "Ei muutoksia dokumentaatiossa."
          else
            git commit -m "docs: regeneroi ontologiadokumentaatio [skip ci]"
            git push
          fi
