name: Generate Ontology Documentation

on:
  push:
    branches: [main]
    paths:
      - "kelao-ontology-core2.ttl"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Download WIDOCO 1.4.25
        run: |
          wget -q \
            https://github.com/dgarijo/Widoco/releases/download/v1.4.25/widoco-1.4.25-jar-with-dependencies_JDK-17.jar \
            -O /tmp/widoco.jar

      - name: Generate ontology documentation
        run: |
          set -e
          # Generoidaan dokumentaatio väliaikaiseen hakemistoon
          java -jar /tmp/widoco.jar \
            -ontFile kelao-ontology-core2.ttl \
            -outFolder /tmp/widoco-output \
            -lang en-fi \
            -rewriteAll \
            -includeAnnotationProperties \
            -noPlaceholders \
            -htaccess \
            -webVowl \
            -uniteSections

          echo "WIDOCO valmis, listataan tulostetiedostot:"
          ls /tmp/widoco-output/

          # Poistetaan vanhat dokumentit reposta
          rm -rf resources/ sections/ webvowl/
          rm -f index.html index-en.html index-fi.html 406.html
          rm -f ontology.jsonld ontology.nt ontology.owl ontology.ttl

          # Kopioidaan uudet tiedostot repon juureen
          cp -r /tmp/widoco-output/. .

      - name: Commit and push updated documentation
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git status
          if git diff --staged --quiet; then
            echo "Ei muutoksia dokumentaatiossa."
          else
            git commit -m "docs: regeneroi ontologiadokumentaatio [skip ci]"
            git push
          fi
