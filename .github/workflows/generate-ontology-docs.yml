name: Generate Ontology Documentation

on:
  push:
    branches: [main]
    paths:
      - "kelao-ontology-core2.ttl"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  generate-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Download WIDOCO 1.4.25
        run: |
          wget -q \
            https://github.com/dgarijo/Widoco/releases/download/v1.4.25/widoco-1.4.25-jar-with-dependencies_JDK-17.jar \
            -O /tmp/widoco.jar
          echo "Ladattu: $(du -sh /tmp/widoco.jar)"

      - name: Generate ontology documentation
        run: |
          mkdir -p /tmp/widoco-output

          echo "=== Ajetaan WIDOCO ==="
          java -jar /tmp/widoco.jar \
            -ontFile kelao-ontology-core2.ttl \
            -outFolder /tmp/widoco-output \
            -lang en-fi \
            -rewriteAll \
            -webVowl 2>&1 | tee /tmp/widoco.log
          EXIT_CODE=${PIPESTATUS[0]}

          echo "=== WIDOCO exit code: $EXIT_CODE ==="
          echo "=== Tulostetiedostot /tmp/widoco-output/ ==="
          ls -la /tmp/widoco-output/ 2>/dev/null || echo "(tyhjä)"

          if [ $EXIT_CODE -ne 0 ]; then
            echo "WIDOCO epäonnistui. Loki yllä."
            exit $EXIT_CODE
          fi

          echo "=== Kopioidaan repoon ==="
          rm -rf resources/ sections/ webvowl/ provenance/
          rm -f index.html index-en.html index-fi.html 406.html readme.md
          rm -f ontology.jsonld ontology.nt ontology.owl ontology.ttl
          cp -r /tmp/widoco-output/. .

          # Täytetään introduction-osiot dct:description-arvoilla ontologiasta
          pip install rdflib -q
          python3 generate-intro.py

          # Luodaan index.html joka ohjaa suomenkieliseen dokumentaatioon
          {
            echo '<!DOCTYPE html>'
            echo '<html lang="fi">'
            echo '<head>'
            echo '  <meta charset="UTF-8">'
            echo '  <meta http-equiv="refresh" content="0; url=index-fi.html">'
            echo '  <title>Sosiaaliturvan ydinontologia / Finnish Social Security Core Ontology</title>'
            echo '</head>'
            echo '<body>'
            echo '  <p><a href="index-fi.html">Suomeksi</a> | <a href="index-en.html">In English</a></p>'
            echo '</body>'
            echo '</html>'
          } > index.html

      - name: Commit and push updated documentation
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          if git diff --staged --quiet; then
            echo "Ei muutoksia."
          else
            git commit -m "docs: regeneroi ontologiadokumentaatio [skip ci]"
            git push
          fi
